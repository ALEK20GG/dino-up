<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Movement Pointer Lock</title>
<style>
body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script type="module">

import Input from "./input.js";

/* ─── SERVER CONNECTION ─────────────────────────────────────── */

const socket = new WebSocket("ws://localhost:8081");

let myId = null;
let otherPlayers = {};

let meshes = {};

/* ─── DATA RECIEVING ─────────────────────────────────────── */

socket.onmessage = (event) => {

const data = JSON.parse(event.data);

if (data.type === "init") {
  myId = data.id;
  otherPlayers = data.players;
}

if (data.type === "state") {
  otherPlayers = data.players;
}

};

/* ─── SCENA ─────────────────────────────────────── */

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

/* ─── CAMERA ─────────────────────────────────────── */

let camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

/* ─── RENDERER ───────────────────────────────────── */

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ─── LUCI ───────────────────────────────────────── */

scene.add(new THREE.AmbientLight(0xffffff, 0.5));

let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

/* ─── TERRENO ─────────────────────────────────────── */

let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshStandardMaterial({ color: 0x808080 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

scene.add(new THREE.GridHelper(200, 50));

/* ─── PLAYER ─────────────────────────────────────── */

let player = new THREE.Mesh(
  new THREE.BoxGeometry(1, 1, 1),
  new THREE.MeshStandardMaterial({ color: 0x00ff00 })
);
player.position.y = 0.5;
scene.add(player);

/* ─── CAMERA SETTINGS ────────────────────────────── */

let cameraDistance = 8;
let cameraHeight   = 4;

// yaw  = rotazione orizzontale (sinistra/destra)
// pitch = rotazione verticale  (su/giù) — opzionale, per ora non usato
let yaw   = 0;
let pitch = 0;

const CAM_YAW_SPEED   = 0.03;   // velocità rotazione telecamera con tasti
const MOUSE_SENSITIVITY = 0.002;

/* ─── FISICA ─────────────────────────────────────── */

let speedForward = 0;
let speedSide    = 0;

const acceleration = 0.02;
const deceleration = 0.015;
const maxSpeed     = 0.3;

let velocityY  = 0;
const gravity  = -0.01;
const jumpForce = 0.25;
let isGrounded = true;

/* ─── INPUT ──────────────────────────────────────── */

const input = new Input();

/* ─── POINTER LOCK (mouse → yaw telecamera) ──────── */

document.body.addEventListener("click", () => {
  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e => {
  if (document.pointerLockElement === document.body) {
    yaw -= e.movementX * MOUSE_SENSITIVITY;
  }
});

/* ─── MOVIMENTO ──────────────────────────────────── */

function move() {

  // Direzione basata su yaw della telecamera
  const forward = new THREE.Vector3( Math.sin(yaw), 0,  Math.cos(yaw));
  const right   = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw));

  const mv = input.input.moveDir;

  // Avanti / indietro  → v del moveDir (-1 avanti, +1 indietro, come GML)
  if (mv.v < 0)      speedForward += acceleration;
  else if (mv.v > 0) speedForward -= acceleration;
  else {
    if (speedForward > 0) { speedForward -= deceleration; if (speedForward < 0) speedForward = 0; }
    if (speedForward < 0) { speedForward += deceleration; if (speedForward > 0) speedForward = 0; }
  }

  // Laterale → h del moveDir (-1 sinistra, +1 destra)
  if (mv.h < 0)      speedSide += acceleration;
  else if (mv.h > 0) speedSide -= acceleration;
  else {
    if (speedSide > 0) { speedSide -= deceleration; if (speedSide < 0) speedSide = 0; }
    if (speedSide < 0) { speedSide += deceleration; if (speedSide > 0) speedSide = 0; }
  }

  speedForward = Math.max(-maxSpeed, Math.min(maxSpeed, speedForward));
  speedSide    = Math.max(-maxSpeed, Math.min(maxSpeed, speedSide));

  player.position.add(forward.clone().multiplyScalar(speedForward));
  player.position.add(right.clone().multiplyScalar(speedSide));

  // Ruota il mesh del player nella direzione di movimento
  if (speedForward !== 0 || speedSide !== 0) {
    const moveAngle = Math.atan2(speedSide, speedForward);
    player.rotation.y = yaw + moveAngle;
  }

}

/* ─── TELECAMERA con frecce / right stick ────────── */

function updateCameraYaw() {

  const cam = input.input.camDir;

  // h: -1 ruota sinistra, +1 ruota destra
  yaw -= cam.h * CAM_YAW_SPEED;

}

/* ─── SALTO ──────────────────────────────────────── */

function handleJump() {

  if (input.input.jumpPressed && isGrounded) {
    velocityY  = jumpForce;
    isGrounded = false;
  }

}

/* ─── GRAVITÀ ─────────────────────────────────────── */

function applyGravity() {

  velocityY += gravity;
  player.position.y += velocityY;

  if (player.position.y <= 0.5) {
    player.position.y = 0.5;
    velocityY  = 0;
    isGrounded = true;
  }

}

/* ─── LOOP ───────────────────────────────────────── */

function animate() {

  requestAnimationFrame(animate);

  input.update();

  updateCameraYaw();
  handleJump();
  move();
  applyGravity();

  // Posizione camera dietro il player
  camera.position.x = player.position.x - Math.sin(yaw) * cameraDistance;
  camera.position.z = player.position.z - Math.cos(yaw) * cameraDistance;
  camera.position.y = player.position.y + cameraHeight;

  camera.lookAt(
    player.position.x,
    player.position.y,
    player.position.z
  );

  renderer.render(scene, camera);
  if (socket.readyState === WebSocket.OPEN && myId) {

socket.send(JSON.stringify({
  type: "update",
  x: player.position.x,
  y: player.position.y,
  z: player.position.z,
  yaw: yaw
}));

}

for (let id in otherPlayers) {

if (id === myId) continue;

let p = otherPlayers[id];

if (!meshes[id]) {

  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({ color: 0xff0000 })
  );

  scene.add(mesh);
  meshes[id] = mesh;
}

meshes[id].position.set(p.x, p.y, p.z);
meshes[id].rotation.y = p.yaw;

}

}

animate();

</script>

</body>
</html>
